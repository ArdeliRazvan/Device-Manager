<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <span class="auth-icon">📱</span>
      <h1>Create Account</h1>
      <p>Join Device Manager</p>
    </div>

    <div *ngIf="error" class="alert-error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" formControlName="name"
               placeholder="John Doe"
               [class.is-invalid]="isInvalid('name')" />
        <span class="field-error" *ngIf="isInvalid('name')">{{ getError('name') }}</span>
      </div>

      <div class="form-group">
        <label>Email <span class="req">*</span></label>
        <input type="email" formControlName="email"
               placeholder="you@example.com"
               [class.is-invalid]="isInvalid('email')" />
        <span class="field-error" *ngIf="isInvalid('email')">{{ getError('email') }}</span>
      </div>

      <div class="form-group">
        <label>Password <span class="req">*</span></label>
        <input type="password" formControlName="password"
               placeholder="Minimum 6 characters"
               [class.is-invalid]="isInvalid('password')" />
        <span class="field-error" *ngIf="isInvalid('password')">{{ getError('password') }}</span>
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" formControlName="location"
               placeholder="e.g. Bucharest, Romania" />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="loading" class="spinner-sm"></span>
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
